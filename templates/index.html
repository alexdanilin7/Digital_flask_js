<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями</title>
    <!-- Подключение Bootstrap CSS (Задание 2) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .user-row { cursor: pointer; transition: background 0.2s; }
        .user-row:hover { background-color: #f1f1f1; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Список пользователей</h1>

    <!-- Задание 3: Форма добавления -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-primary text-white">Добавить нового пользователя</div>
        <div class="card-body">
            <form id="addUserForm" class="row g-3">
                <div class="col-md-5">
                    <input type="text" class="form-control" id="nameInput" placeholder="Имя" required>
                </div>
                <div class="col-md-5">
                    <input type="email" class="form-control" id="emailInput" placeholder="Email" required>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100">Добавить</button>
                </div>
            </form>
            <div id="formMessage" class="mt-2"></div>
        </div>
    </div>

    <!-- Задание 2: Таблица пользователей -->
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Email</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody id="usersTableBody">
                <!-- Данные будут загружены через JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Задание 2: Модальное окно для деталей -->
<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Информация о пользователе</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p><strong>ID:</strong> <span id="modalId"></span></p>
                <p><strong>Имя:</strong> <span id="modalName"></span></p>
                <p><strong>Email:</strong> <span id="modalEmail"></span></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>

<!-- Подключение Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = '/users';
    const tableBody = document.getElementById('usersTableBody');
    const addUserForm = document.getElementById('addUserForm');
    const formMessage = document.getElementById('formMessage');
    const userModal = new bootstrap.Modal(document.getElementById('userModal'));

    async function loadUsers() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Ошибка сети');
            const users = await response.json();

            tableBody.innerHTML = '';
            users.forEach(user => {
                const row = document.createElement('tr');
                row.className = 'user-row';
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td><button class="btn btn-sm btn-info text-white" onclick="showUserDetails(${user.id})">Подробнее</button></td>
                `;
                row.onclick = (e) => {
                    if(e.target.tagName !== 'BUTTON') showUserDetails(user.id);
                };
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            tableBody.innerHTML = '<tr><td colspan="4" class="text-danger">Ошибка загрузки данных</td></tr>';
        }
    }

    async function showUserDetails(id) {
        try {
            const response = await fetch(`${API_URL}/${id}`);

            if (response.status === 404) {
                alert('Пользователь не найден');
                return;
            }

            if (!response.ok) throw new Error('Ошибка');

            const user = await response.json();


            document.getElementById('modalId').textContent = user.id;
            document.getElementById('modalName').textContent = user.name;
            document.getElementById('modalEmail').textContent = user.email;

            userModal.show();
        } catch (error) {
            console.error('Ошибка получения деталей:', error);
        }
    }

    addUserForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('nameInput').value;
        const email = document.getElementById('emailInput').value;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name, email })
            });

            const result = await response.json();

            if (response.ok) {

                formMessage.innerHTML = `<div class="alert alert-success">${result.message}</div>`;
                addUserForm.reset();
                loadUsers(); // Обновляем таблицу без перезагрузки
                setTimeout(() => formMessage.innerHTML = '', 3000);
            } else {
                formMessage.innerHTML = `<div class="alert alert-danger">${result.error}</div>`;
            }
        } catch (error) {
            formMessage.innerHTML = `<div class="alert alert-danger">Ошибка соединения с сервером</div>`;
        }
    });
    loadUsers();
</script>

</body>
</html>
